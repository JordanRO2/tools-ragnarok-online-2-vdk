name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore VDKTool.sln

      - name: Build
        run: dotnet build VDKTool.sln -c Release --no-restore

      # Self-contained regression: runs the harness against the committed
      # fixtures in tests/fixtures/ (no client files required). The harness
      # exits non-zero on any failure, which fails the job.
      - name: Test (self-contained fixtures)
        run: dotnet run --project tests/VDKTool.Tests -c Release

      # Single-file publish is intentionally not run in CI for now.
      # - name: Publish (single-file)
      #   run: dotnet publish src/VDKTool/VDKTool.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
